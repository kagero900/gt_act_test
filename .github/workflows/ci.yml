name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say hello
        run: echo "Hello, automation!"

      - name: Create artifact with date
        run: |
          echo "Build date: $(date '+%Y-%m-%d %H:%M:%S')" > build-info.txt
          echo "Triggered by: ${{ github.actor }}" >> build-info.txt
          
      - name: Intentional failure - missing dependency
        run: |
          curl -s https://api.github.com/repos/kagero900/gt_act_test/actions/runs | jq '.workflow_runs[0].display_title'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt